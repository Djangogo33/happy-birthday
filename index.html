<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Vœux</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full">
    <div id="app" class="h-full w-full overflow-auto" style="font-family: 'Quicksand', sans-serif;">
        <div id="creatorPanel" class="h-full w-full flex items-center justify-center p-4" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);">
            <div class="w-full max-w-lg rounded-3xl p-8 space-y-6" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
                <h1 class="text-2xl font-bold text-white text-center" style="font-family: 'Playfair Display', serif;">Créer une carte</h1>
                <input id="inputName" type="text" value="Emma" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white outline-none">
                <textarea id="inputMsg" rows="2" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white outline-none">Que cette journée soit remplie de bonheur ✨</textarea>
                <button id="btnCreate" class="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-500 to-pink-500 text-white font-bold transition-all hover:scale-[1.02]">Générer la surprise ✨</button>
            </div>
        </div>

        <div id="cardView" class="h-full w-full hidden flex-col items-center justify-center p-4 relative overflow-hidden">
            <div id="confettiLayer" class="absolute inset-0 pointer-events-none z-10"></div>
            <div id="card" class="bg-white/10 backdrop-blur-2xl border border-white/20 rounded-[2.5rem] p-10 text-center space-y-6 shadow-2xl relative z-20">
                <div id="cardEmoji" class="text-7xl bounce-in">🎂</div>
                <h2 id="cardName" class="text-5xl font-black shimmer-text text-white" style="font-family: 'Playfair Display', serif;"></h2>
                <p id="cardMsg" class="text-lg opacity-80 text-white"></p>
                <button onclick="location.reload()" class="mt-8 text-xs font-bold uppercase opacity-40 text-white hover:opacity-100">← Recommencer</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
